name: Daily Auto Commit Bot

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  auto-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure Git
        run: |
          git config user.name "CommitBot"
          git config user.email "your-email@users.noreply.github.com"

      - name: Create or update file
        run: |
          echo "Last updated: $(date)" >> log.txt

      - name: Commit changes
        run: |
          git add log.txt
          git commit -m "Auto commit - $(date)" || echo "Nothing to commit"

      - name: Push changes
        run: |
          git push
